apiVersion: v1
kind: ConfigMap
metadata:
  name: db-setup-sql
data:
  setup.sql: |
    -- Create all Entra ID roles from the 'postgres' database where pgaadauth exists
    \c postgres

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'mi-flowforge-app-dev') THEN
        PERFORM pgaadauth_create_principal('mi-flowforge-app-dev', false, false);
      END IF;
    END
    $$;

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'mi-ai-dev-m9mp04') THEN
        PERFORM pgaadauth_create_principal('mi-ai-dev-m9mp04', false, false);
      END IF;
    END
    $$;

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'mi-flowforge-app-prod') THEN
        PERFORM pgaadauth_create_principal('mi-flowforge-app-prod', false, false);
      END IF;
    END
    $$;

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'mi-ai-prod-m9mp04') THEN
        PERFORM pgaadauth_create_principal('mi-ai-prod-m9mp04', false, false);
      END IF;
    END
    $$;

    -- Setup flowforge-dev database permissions
    \c flowforge-dev
    
    GRANT CONNECT ON DATABASE "flowforge-dev" TO "mi-flowforge-app-dev";
    GRANT ALL ON SCHEMA public TO "mi-flowforge-app-dev";
    GRANT ALL ON ALL TABLES IN SCHEMA public TO "mi-flowforge-app-dev";
    GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO "mi-flowforge-app-dev";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO "mi-flowforge-app-dev";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO "mi-flowforge-app-dev";

    GRANT CONNECT ON DATABASE "flowforge-dev" TO "mi-ai-dev-m9mp04";
    GRANT ALL ON SCHEMA public TO "mi-ai-dev-m9mp04";
    GRANT ALL ON ALL TABLES IN SCHEMA public TO "mi-ai-dev-m9mp04";
    GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO "mi-ai-dev-m9mp04";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO "mi-ai-dev-m9mp04";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO "mi-ai-dev-m9mp04";

    -- Setup flowforge-prod database permissions
    \c flowforge-prod

    GRANT CONNECT ON DATABASE "flowforge-prod" TO "mi-flowforge-app-prod";
    GRANT ALL ON SCHEMA public TO "mi-flowforge-app-prod";
    GRANT ALL ON ALL TABLES IN SCHEMA public TO "mi-flowforge-app-prod";
    GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO "mi-flowforge-app-prod";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO "mi-flowforge-app-prod";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO "mi-flowforge-app-prod";

    GRANT CONNECT ON DATABASE "flowforge-prod" TO "mi-ai-prod-m9mp04";
    GRANT ALL ON SCHEMA public TO "mi-ai-prod-m9mp04";
    GRANT ALL ON ALL TABLES IN SCHEMA public TO "mi-ai-prod-m9mp04";
    GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO "mi-ai-prod-m9mp04";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO "mi-ai-prod-m9mp04";
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO "mi-ai-prod-m9mp04";

---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-setup-job-v2
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - name: psql
        image: postgres:15-alpine
        command:
        - "/bin/sh"
        - "-c"
        - "psql -h pgsql-40xtuj.postgres.database.azure.com -U FlowForge-DevOps -d postgres -f /scripts/setup.sql"
        env:
        - name: PGPASSWORD
          value: "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsIng1dCI6ImFGa21LVkZjLTRXVjZzWENCdk5aa1hJNTA1WSIsImtpZCI6ImFGa21LVkZjLTRXVjZzWENCdk5aa1hJNTA1WSJ9..YHSGVuwOMa3tIye0Kl4NDhbVvQUkYWijWBUVSOqwARjhAX6FaBXljuGun-OgR4JIy3HrOo6fkUF7PXSjnd0_w7d4V7HBmhDfPqRE9dsWqOGZ1pEziRa3ECTtcFr0b331zHBdif5piijrDYAQYBRg0MGxJEK56a5qxhzlbHNX94qvOMVa2ZDPv5yXA74QiHc6-BWcNkTWe-Ml744U1ct9nFE4m2csi9exqIQCzZgt-a1tG2pwlnMPSEawv9fdrV2okiy-nkmhCpLEV6fvCcsJcJtT9oCL1nwJhNdX16zAw5QryXcNEaRsFHkQjEq0is8ibjipH0rdTDdCT8GtQNUwZA"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      restartPolicy: Never
      volumes:
      - name: scripts
        configMap:
          name: db-setup-sql
