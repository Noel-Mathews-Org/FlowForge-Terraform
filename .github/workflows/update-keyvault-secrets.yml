name: Update Key Vault Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to update secrets for'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  prep:
    name: "Prepare Execution"
    runs-on: ubuntu-latest
    steps:
      - name: Print Environment
        run: echo "Preparing to update Key Vault for environment ${{ inputs.environment }}"

  update-secrets:
    name: "Update Key Vault Secrets"
    runs-on: self-hosted
    needs: prep
    environment: ${{ inputs.environment }}
    env:
      KEYVAULT_NAME: ${{ vars.KEYVAULT_NAME }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARC_RUNNER_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync Secrets to Key Vault
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          ENTRA_CLIENT_SECRET: ${{ secrets.ENTRA_CLIENT_SECRET }}
          AZURE_FOUNDRY_KEY: ${{ secrets.AZURE_FOUNDRY_KEY }}
          AZURE_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ENTRA_GROUP_PLATFORM_ADMIN: ${{ secrets.ENTRA_GROUP_PLATFORM_ADMIN }}
          ENTRA_GROUP_ORG_OWNER: ${{ secrets.ENTRA_GROUP_ORG_OWNER }}
          ENTRA_GROUP_MANAGER: ${{ secrets.ENTRA_GROUP_MANAGER }}
          ENTRA_GROUP_MEMBER: ${{ secrets.ENTRA_GROUP_MEMBER }}
        run: |
          # Define the mapping of Key Vault secret names to their environment variable names
          declare -A SECRET_MAP=(
            ["database-url"]="DATABASE_URL"
            ["redis-url"]="REDIS_URL"
            ["jwt-secret"]="JWT_SECRET"
            ["internal-api-key"]="INTERNAL_API_KEY"
            ["entra-tenant-id"]="ENTRA_TENANT_ID"
            ["entra-client-id"]="ENTRA_CLIENT_ID"
            ["entra-client-secret"]="ENTRA_CLIENT_SECRET"
            ["azure-foundry-key"]="AZURE_FOUNDRY_KEY"
            ["azure-foundry-endpoint"]="AZURE_FOUNDRY_ENDPOINT"
            ["smtp-username"]="SMTP_USERNAME"
            ["smtp-password"]="SMTP_PASSWORD"
            ["entra-group-platform-admin"]="ENTRA_GROUP_PLATFORM_ADMIN"
            ["entra-group-org-owner"]="ENTRA_GROUP_ORG_OWNER"
            ["entra-group-manager"]="ENTRA_GROUP_MANAGER"
            ["entra-group-member"]="ENTRA_GROUP_MEMBER"
          )

          echo "Starting Key Vault sync to $KEYVAULT_NAME..."

          for SECRET_NAME in "${!SECRET_MAP[@]}"; do
            ENV_VAR_NAME=${SECRET_MAP[$SECRET_NAME]}
            NEW_VALUE=${!ENV_VAR_NAME}

            if [ -z "$NEW_VALUE" ]; then
              echo "⚠️ Warning: No value provided in GitHub Secrets for $SECRET_NAME (mapped to $ENV_VAR_NAME). Skipping."
              continue
            fi

            echo "Processing secret: $SECRET_NAME"

            # Check if secret exists and get current value
            CURRENT_VALUE=$(az keyvault secret show --name $SECRET_NAME --vault-name $KEYVAULT_NAME --query "value" -o tsv 2>/dev/null || echo "NOT_FOUND")

            if [ "$CURRENT_VALUE" == "NOT_FOUND" ]; then
                echo "  -> Creating new secret: $SECRET_NAME"
                az keyvault secret set --vault-name $KEYVAULT_NAME --name $SECRET_NAME --value "$NEW_VALUE" > /dev/null
            elif [ "$CURRENT_VALUE" == "$NEW_VALUE" ]; then
                echo "  -> Secret is up to date."
            else
                echo "  -> Updating existing secret to new version."
                az keyvault secret set --vault-name $KEYVAULT_NAME --name $SECRET_NAME --value "$NEW_VALUE" > /dev/null
            fi

            # Disable all old versions to ensure only the latest is active
            echo "  -> Cleaning up old versions..."
            VERSIONS=$(az keyvault secret list-versions --vault-name $KEYVAULT_NAME --name $SECRET_NAME --query "[?attributes.enabled].id" -o tsv)
            LATEST_VERSION=$(az keyvault secret show --vault-name $KEYVAULT_NAME --name $SECRET_NAME --query "id" -o tsv)

            for VERSION_ID in $VERSIONS; do
                if [ "$VERSION_ID" != "$LATEST_VERSION" ]; then
                    VERSION=$(basename $VERSION_ID)
                    echo "    -> Disabling old version: $VERSION"
                    az keyvault secret set-attributes --vault-name $KEYVAULT_NAME --name $SECRET_NAME --version $VERSION --enabled false > /dev/null
                fi
            done
            echo "  -> Done processing $SECRET_NAME"
            echo "-----------------------------------"
          done

          echo "🎉 All secrets synced successfully!"

      - name: Send Notification Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.SMTP_USERNAME }}
          from: FlowForge DevOps <${{ secrets.SMTP_USERNAME }}>
          subject: "${{ job.status == 'success' && '✅' || '❌' }} Key Vault Secret Update | ${{ inputs.environment }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:${{ job.status == 'success' && '#28a745' || '#dc3545' }};color:white;padding:20px">
                <h2 style="margin:0;font-size:20px">Key Vault Update ${{ job.status }}</h2>
                <p style="margin:6px 0 0;opacity:0.9;font-size:14px">Environment: ${{ inputs.environment }}</p>
              </div>
              <div style="padding:20px">
                <p>The secret synchronization pipeline finished with status: <strong>${{ job.status }}</strong>.</p>
              </div>
            </div>
