name: "Terraform GitOps Pipeline"

on:
  push:
    branches:
      - Cloud-Track-dev
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
jobs:
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.env_name }}
      gh_env: ${{ steps.set-env.outputs.gh_env }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.base_ref }}" == "main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "gh_env=prod-create" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "gh_env=dev-create" >> $GITHUB_OUTPUT
          fi

  terraform-ci:
    name: "Terraform CI (Plan & Scan)"
    runs-on: ubuntu-latest
    needs: determine-env
    environment: ${{ needs.determine-env.outputs.gh_env }}
    outputs:
      checkov_passed: ${{ steps.checkov-parse.outputs.passed }}
      checkov_failed: ${{ steps.checkov-parse.outputs.failed }}
      infracost_total: ${{ steps.infracost.outputs.total }}
      infracost_diff: ${{ steps.infracost.outputs.diff }}
    env:
      TF_VAR_postgres_admin_username: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_jumpbox_admin_password: ${{ secrets.JUMPBOX_ADMIN_PASSWORD }}
    defaults:
      run:
        working-directory: env/${{ needs.determine-env.outputs.env_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.4"
          terraform_wrapper: false

      - name: Terraform Format
        run: |
          terraform fmt -check -recursive env/prod
          terraform fmt -check -recursive modules
        working-directory: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -parallelism=30 -no-color -out=tfplan
        
      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: env/${{ needs.determine-env.outputs.env_name }}
          framework: terraform
          soft_fail: true
          output_format: cli,json
          output_file_path: console,checkov.json
          
      - name: Parse Checkov Results
        id: checkov-parse
        run: |
          if [ -f $GITHUB_WORKSPACE/checkov.json ]; then
            PASSED=$(jq '.summary.passed // 0' $GITHUB_WORKSPACE/checkov.json)
            FAILED=$(jq '.summary.failed // 0' $GITHUB_WORKSPACE/checkov.json)
          else
            PASSED=0
            FAILED=0
          fi
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
          
      - name: Run Infracost Cost Estimate
        id: infracost
        run: |
          terraform show -json tfplan > plan.json
          infracost breakdown --path plan.json --format json --out-file infracost.json
          infracost breakdown --path plan.json --format table
          
          TOTAL=$(jq -r '.projects[0].breakdown.totalMonthlyCost // "0.00"' infracost.json)
          DIFF=$(jq -r '.diffTotalMonthlyCost // "0.00"' infracost.json)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "diff=$DIFF" >> $GITHUB_OUTPUT
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.determine-env.outputs.env_name }}
          path: env/${{ needs.determine-env.outputs.env_name }}/tfplan
          retention-days: 1

  notify-approval-required:
    name: "Notify Approval Required"
    needs: [determine-env, terraform-ci]
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send Approval Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: FlowForge DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "⏳ Approval Required | Terraform CD | ${{ needs.determine-env.outputs.env_name }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:#f0ad4e;color:white;padding:20px">
                <h2 style="margin:0;font-size:20px">⏳ Deployment Approval Required</h2>
                <p style="margin:6px 0 0;opacity:0.9;font-size:14px">Environment: ${{ needs.determine-env.outputs.env_name }} | Triggered by: ${{ github.actor }}</p>
              </div>
              <div style="padding:20px">
                <h3 style="margin:0 0 12px;font-size:14px;color:#6c757d;text-transform:uppercase">Security Scan (Checkov)</h3>
                <p style="margin:0 0 10px;font-size:14px"><strong>Passed Checks:</strong> ${{ needs.terraform-ci.outputs.checkov_passed }}<br/><strong>Failed Checks:</strong> ${{ needs.terraform-ci.outputs.checkov_failed }}</p>
                <h3 style="margin:20px 0 12px;font-size:14px;color:#6c757d;text-transform:uppercase">Cost Estimate (Infracost)</h3>
                <p style="margin:0 0 20px;font-size:14px"><strong>Total Monthly Bill:</strong> $${{ needs.terraform-ci.outputs.infracost_total }}<br/><strong>Extra Cost:</strong> $${{ needs.terraform-ci.outputs.infracost_diff }}</p>
                <div style="text-align:center;margin-top:20px">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background:#0366d6;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:14px;display:inline-block">Review & Approve Deployment</a>
                </div>
              </div>
            </div>

  terraform-cd:
    name: "Terraform CD (Apply)"
    runs-on: ubuntu-latest
    needs: [determine-env, terraform-ci]
    # Github Environment Deployment Protection Rules
    environment: ${{ needs.determine-env.outputs.gh_env }}
    env:
      TF_VAR_postgres_admin_username: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_jumpbox_admin_password: ${{ secrets.JUMPBOX_ADMIN_PASSWORD }}
    defaults:
      run:
        working-directory: env/${{ needs.determine-env.outputs.env_name }}

    if: github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.determine-env.outputs.env_name }}
          path: env/${{ needs.determine-env.outputs.env_name }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.4"
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -parallelism=30 -auto-approve tfplan

  notify:
    name: "Notify Team"
    needs: [determine-env, terraform-ci, terraform-cd]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.terraform-cd.result }}" == "success" ]]; then
            echo "EMOJI=✅" >> $GITHUB_OUTPUT
            echo "COLOR=#5cb85c" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=SUCCESS" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.terraform-cd.result }}" == "cancelled" ]]; then
            echo "EMOJI=⚠️" >> $GITHUB_OUTPUT
            echo "COLOR=#f0ad4e" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=CANCELLED" >> $GITHUB_OUTPUT
          else
            echo "EMOJI=❌" >> $GITHUB_OUTPUT
            echo "COLOR=#d9534f" >> $GITHUB_OUTPUT
            echo "STATUS_TEXT=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Notification Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.DEVELOPMENT_TEAM_EMAIL }}
          from: FlowForge DevOps <${{ secrets.MAIL_USERNAME }}>
          subject: "${{ steps.status.outputs.EMOJI }} ${{ steps.status.outputs.STATUS_TEXT }} | Terraform Apply | ${{ needs.determine-env.outputs.env_name }}"
          html_body: |
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #ddd;border-radius:8px;overflow:hidden">
              <div style="background:${{ steps.status.outputs.COLOR }};color:white;padding:20px">
                <h2 style="margin:0;font-size:20px">${{ steps.status.outputs.EMOJI }} Terraform Apply ${{ steps.status.outputs.STATUS_TEXT }}</h2>
                <p style="margin:6px 0 0;opacity:0.9;font-size:14px">Environment: ${{ needs.determine-env.outputs.env_name }} | Triggered by: ${{ github.actor }}</p>
              </div>
              <div style="padding:20px">
                <p style="font-size:14px;color:#333">The <strong>${{ needs.determine-env.outputs.env_name }}</strong> infrastructure deployment has <strong>${{ steps.status.outputs.STATUS_TEXT }}</strong>.</p>
                <div style="text-align:center;margin-top:20px">
                  <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background:#24292e;color:white;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:14px;display:inline-block">View Logs</a>
                </div>
              </div>
            </div>
